name: 텔레그램 웹훅 배포

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Edge Function 배포 & 웹훅 설정
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Supabase CLI 설치
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Edge Function 배포
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy telegram-webhook \
            --project-ref unuvbdqjgiypxfvlplpd \
            --no-verify-jwt

      - name: Edge Function 시크릿 설정
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set \
            TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}" \
            GITHUB_TOKEN="${{ secrets.GH_PAT }}" \
            --project-ref unuvbdqjgiypxfvlplpd

      - name: 텔레그램 웹훅 설정
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          WEBHOOK_URL="https://unuvbdqjgiypxfvlplpd.supabase.co/functions/v1/telegram-webhook"
          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\": \"${WEBHOOK_URL}\", \"allowed_updates\": [\"message\"]}")
          echo "$RESPONSE"
          echo "$RESPONSE" | jq -e '.ok == true' || exit 1
          echo "웹훅 설정 완료: $WEBHOOK_URL"

      - name: 텔레그램 명령어 목록 등록
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setMyCommands" \
            -H "Content-Type: application/json" \
            -d '{
              "commands": [
                {"command": "생각일기",  "description": "이사회 분석 (예: /생각일기 3시간)"},
                {"command": "이사회",    "description": "이사회 분석 (예: /이사회 6시간)"},
                {"command": "명령어",    "description": "전체 명령어 도움말"},
                {"command": "주제",      "description": "인터뷰 주제 목록"},
                {"command": "인터뷰",    "description": "인터뷰 에이전트 상태"},
                {"command": "주기",      "description": "질문 주기 확인/변경"},
                {"command": "대본",      "description": "유튜브 대본 생성"},
                {"command": "건너뛰기",  "description": "현재 질문 건너뛰기"}
              ]
            }')
          echo "$RESPONSE"
          echo "$RESPONSE" | jq -e '.ok == true' || exit 1
          echo "명령어 목록 등록 완료"

      - name: 웹훅 상태 확인
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo" | jq .
