name: 텔레그램 웹훅 배포

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Edge Function 배포 & 웹훅 설정
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Supabase CLI 설치
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          npm install -g supabase

      - name: Edge Function 배포
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase functions deploy telegram-webhook \
            --project-ref unuvbdqjgiypxfvlplpd \
            --no-verify-jwt

      - name: Edge Function 시크릿 설정
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "${{ secrets.TELEGRAM_BOT_TOKEN }}" | npx supabase secrets set TELEGRAM_BOT_TOKEN --project-ref unuvbdqjgiypxfvlplpd
          echo "${{ secrets.TELEGRAM_CHAT_ID }}" | npx supabase secrets set TELEGRAM_CHAT_ID --project-ref unuvbdqjgiypxfvlplpd
          echo "${{ secrets.SUPABASE_URL }}" | npx supabase secrets set SUPABASE_URL --project-ref unuvbdqjgiypxfvlplpd
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | npx supabase secrets set SUPABASE_SERVICE_ROLE_KEY --project-ref unuvbdqjgiypxfvlplpd
          echo "${{ secrets.GH_PAT }}" | npx supabase secrets set GITHUB_TOKEN --project-ref unuvbdqjgiypxfvlplpd

      - name: 텔레그램 웹훅 설정
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          WEBHOOK_URL="https://unuvbdqjgiypxfvlplpd.supabase.co/functions/v1/telegram-webhook"
          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\": \"${WEBHOOK_URL}\", \"allowed_updates\": [\"message\"]}")
          echo "$RESPONSE"
          echo "$RESPONSE" | jq -e '.ok == true' || exit 1
          echo "웹훅 설정 완료: $WEBHOOK_URL"

      - name: 웹훅 상태 확인
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo" | jq .
