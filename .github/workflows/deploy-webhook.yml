name: 텔레그램 웹훅 배포

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Edge Function 배포 & 웹훅 설정
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Supabase CLI 설치
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Edge Function 배포
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy telegram-webhook \
            --project-ref unuvbdqjgiypxfvlplpd \
            --no-verify-jwt

      - name: Edge Function 시크릿 설정
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set \
            TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}" \
            GITHUB_TOKEN="${{ secrets.GH_PAT }}" \
            --project-ref unuvbdqjgiypxfvlplpd

      - name: 텔레그램 웹훅 설정
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          WEBHOOK_URL="https://unuvbdqjgiypxfvlplpd.supabase.co/functions/v1/telegram-webhook"
          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\": \"${WEBHOOK_URL}\", \"allowed_updates\": [\"message\"]}")
          echo "$RESPONSE"
          echo "$RESPONSE" | jq -e '.ok == true' || exit 1
          echo "웹훅 설정 완료: $WEBHOOK_URL"

      - name: 텔레그램 명령어 목록 등록
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          # 텔레그램 명령어는 소문자 영문+숫자+언더스코어만 허용 (한글 불가)
          # 한글 명령어(/생각일기 등)는 웹훅에서 직접 처리하므로 계속 동작함
          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setMyCommands" \
            -H "Content-Type: application/json" \
            -d '{
              "commands": [
                {"command": "board",     "description": "생각일기 이사회 분석 (예: /board 3)"},
                {"command": "agenda",    "description": "이사회 안건 의견 요청 (/안건)"},
                {"command": "vote",      "description": "이사회 찬반 표결 (/표결)"},
                {"command": "help",      "description": "전체 명령어 도움말 (/명령어)"},
                {"command": "topics",    "description": "인터뷰 주제 목록 (/주제)"},
                {"command": "interview", "description": "인터뷰 에이전트 상태 (/인터뷰)"},
                {"command": "interval",  "description": "질문 주기 확인/변경 (/주기)"},
                {"command": "ask",       "description": "지금 바로 질문 받기 (/질문줘)"},
                {"command": "draft",     "description": "유튜브 대본 생성 (/대본)"},
                {"command": "skip",      "description": "현재 질문 건너뛰기 (/건너뛰기)"}
              ]
            }')
          echo "$RESPONSE"
          echo "$RESPONSE" | jq -e '.ok == true' || exit 1
          echo "명령어 목록 등록 완료"

      - name: 웹훅 상태 확인
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo" | jq .
