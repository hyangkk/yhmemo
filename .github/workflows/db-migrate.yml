name: DB 마이그레이션

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: 마이그레이션 실행
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          cat <<'EOSQL' > /tmp/migrate.sql
          CREATE TABLE IF NOT EXISTS interview_topics (
            id SERIAL PRIMARY KEY,
            name TEXT NOT NULL,
            description TEXT DEFAULT '',
            enabled BOOLEAN DEFAULT TRUE,
            total_questions INTEGER DEFAULT 0,
            notion_page_id TEXT DEFAULT '',
            created_at TIMESTAMPTZ DEFAULT NOW()
          );
          ALTER TABLE interview_topics DISABLE ROW LEVEL SECURITY;
          CREATE TABLE IF NOT EXISTS interview_messages (
            id BIGSERIAL PRIMARY KEY,
            topic_id INTEGER REFERENCES interview_topics(id) ON DELETE CASCADE,
            role TEXT NOT NULL CHECK (role IN ('agent', 'user')),
            content TEXT NOT NULL,
            telegram_message_id INTEGER,
            created_at TIMESTAMPTZ DEFAULT NOW()
          );
          CREATE INDEX IF NOT EXISTS idx_interview_messages_topic ON interview_messages (topic_id, created_at);
          ALTER TABLE interview_messages DISABLE ROW LEVEL SECURITY;
          ALTER TABLE agent_settings ADD COLUMN IF NOT EXISTS interview_enabled BOOLEAN DEFAULT TRUE;
          ALTER TABLE agent_settings ADD COLUMN IF NOT EXISTS interview_interval_hours INTEGER DEFAULT 3;
          ALTER TABLE agent_settings ADD COLUMN IF NOT EXISTS interview_last_update_id BIGINT DEFAULT 0;
          ALTER TABLE agent_settings ADD COLUMN IF NOT EXISTS interview_last_question_at TIMESTAMPTZ;
          ALTER TABLE agent_settings ADD COLUMN IF NOT EXISTS interview_notion_database_id TEXT DEFAULT '';
          ALTER TABLE agent_settings ADD COLUMN IF NOT EXISTS interview_interval_minutes INTEGER DEFAULT 0;
          ALTER TABLE agent_settings ADD COLUMN IF NOT EXISTS kstartup_keywords TEXT DEFAULT '';
          ALTER TABLE agent_settings ADD COLUMN IF NOT EXISTS news_interest_keywords TEXT DEFAULT '';
          ALTER TABLE agent_settings ADD COLUMN IF NOT EXISTS news_exclude_keywords TEXT DEFAULT '';
          ALTER TABLE interview_topics ADD COLUMN IF NOT EXISTS draft TEXT DEFAULT '';
          ALTER TABLE interview_topics ADD COLUMN IF NOT EXISTS draft_updated_at TIMESTAMPTZ;
          UPDATE agent_settings SET interview_notion_database_id = '1e21114e-6491-8101-8b67-ca52d78a8fb0' WHERE id = 1;
          ALTER TABLE user_profile DISABLE ROW LEVEL SECURITY;
          CREATE TABLE IF NOT EXISTS board_reports (
            id                   BIGSERIAL PRIMARY KEY,
            created_at           TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            entry_count          INTEGER NOT NULL DEFAULT 0,
            run_every_hours      INTEGER NOT NULL DEFAULT 3,
            summary              TEXT,
            opinion_roi          TEXT,
            opinion_romantic     TEXT,
            opinion_conservative TEXT,
            opinion_zen          TEXT,
            opinion_challenger   TEXT
          );
          ALTER TABLE board_reports DISABLE ROW LEVEL SECURITY;
          ALTER TABLE agent_settings ADD COLUMN IF NOT EXISTS board_notion_db_id TEXT DEFAULT '';
          CREATE TABLE IF NOT EXISTS board_members (
            id          SERIAL PRIMARY KEY,
            key         TEXT NOT NULL UNIQUE,
            name        TEXT NOT NULL,
            role        TEXT NOT NULL DEFAULT '',
            description TEXT NOT NULL DEFAULT '',
            personality TEXT NOT NULL DEFAULT '',
            sort_order  INTEGER NOT NULL DEFAULT 0,
            enabled     BOOLEAN NOT NULL DEFAULT TRUE,
            created_at  TIMESTAMPTZ DEFAULT NOW(),
            updated_at  TIMESTAMPTZ DEFAULT NOW()
          );
          ALTER TABLE board_members DISABLE ROW LEVEL SECURITY;
          INSERT INTO board_members (key, name, role, description, sort_order) VALUES
            ('roi',          '💰 냉정한 이익주의자', 'ROI · 데이터',    'ROI와 데이터를 중심으로 냉철하게 판단하는 분석가', 1),
            ('romantic',     '🌈 낭만 긍정주의자',   '가능성 · 도전',   '가능성과 설렘에 집중하며 도전을 응원하는 꿈꾸는 사람', 2),
            ('conservative', '🛡️ 보수적 조심주의자', '리스크 · 안전',   '리스크와 안전을 최우선으로 검토하는 신중한 이', 3),
            ('zen',          '🧘 내면 평온주의자',   '감정 · 균형추',   '감정과 내면의 균형을 중시하며 삶의 질을 살피는 이', 4),
            ('challenger',   '🚀 도전과 발전주의자', '성장 · 돌파',     '성장과 돌파를 추구하며 현실에 안주하지 않는 불굴의 도전가', 5)
          ON CONFLICT (key) DO NOTHING;
          EOSQL
          SQL=$(cat /tmp/migrate.sql)
          PAYLOAD=$(jq -n --arg q "$SQL" '{"query": $q}')
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.supabase.com/v1/projects/unuvbdqjgiypxfvlplpd/database/query")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP $HTTP_CODE"
          echo "$BODY"
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] && echo "완료" || exit 1
