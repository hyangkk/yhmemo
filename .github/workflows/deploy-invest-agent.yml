name: Deploy Investment Agent to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'investment-agent/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if not exists
        run: flyctl apps create yhmemo-invest-agent --org personal || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Set secrets
        run: |
          flyctl secrets set -a yhmemo-invest-agent \
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" \
            NOTION_INVEST_DB_ID="${{ secrets.NOTION_INVEST_DB_ID }}" \
            SLACK_BOT_TOKEN="${{ secrets.SLACK_BOT_TOKEN }}" \
            --stage
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy -a yhmemo-invest-agent --remote-only
        working-directory: investment-agent
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
