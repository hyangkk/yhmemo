name: 시크릿 → Supabase 동기화

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: secrets_vault 테이블에 토큰 값 동기화
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          upsert_secret() {
            local db_key="$1" val="$2"
            [ -z "$val" ] && return 0
            local escaped_val
            escaped_val=$(printf '%s' "$val" | sed "s/'/''/g")
            local sql="INSERT INTO secrets_vault (key, value, updated_at) VALUES ('${db_key}', '${escaped_val}', NOW()) ON CONFLICT (key) DO UPDATE SET value = EXCLUDED.value, updated_at = NOW();"
            local payload
            payload=$(jq -n --arg q "$sql" '{"query": $q}')
            local resp
            resp=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$payload" \
              "https://api.supabase.com/v1/projects/unuvbdqjgiypxfvlplpd/database/query")
            local code
            code=$(echo "$resp" | tail -1)
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "✓ ${db_key}"
            else
              echo "✗ ${db_key} (HTTP $code)"
              echo "$resp" | sed '$d'
              return 1
            fi
          }

          echo "=== 시크릿 동기화 시작 ==="
          upsert_secret "GH_TOKEN"        "$GH_PAT"
          upsert_secret "NOTION_API_KEY"   "$NOTION_API_KEY"
          upsert_secret "ANTHROPIC_API_KEY" "$ANTHROPIC_API_KEY"
          upsert_secret "SLACK_BOT_TOKEN"  "$SLACK_BOT_TOKEN"
          upsert_secret "SLACK_APP_TOKEN"  "$SLACK_APP_TOKEN"
          upsert_secret "FLY_API_TOKEN"    "$FLY_API_TOKEN"
          echo "=== 동기화 완료 ==="
