name: Web Service 배포

on:
  push:
    branches: [main]
    paths:
      - 'web-service/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Vercel 배포
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Vercel CLI 설치
        run: npm install -g vercel

      - name: Vercel 프로덕션 배포
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_lQMdwq03iCqUN9tTdDFl2VGe
          VERCEL_PROJECT_ID: prj_HfQBSsM0revTwKDvpq5hlQrnxWRN
          BUILD_NUM: ${{ github.run_number }}
        working-directory: web-service
        run: |
          export BUILD_NUM=$(printf "%04d" $BUILD_NUM)
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          # rootDirectory 중복 방지: vercel pull이 가져온 설정에서 rootDirectory 제거
          python3 -c "
          import json
          with open('.vercel/project.json') as f: d = json.load(f)
          d.pop('rootDirectory', None)
          with open('.vercel/project.json', 'w') as f: json.dump(d, f)
          "
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --archive=tgz --token=$VERCEL_TOKEN
