name: Slack Agents 배포

on:
  push:
    branches: [main]
    paths:
      - 'slack-agents/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Fly.io 배포
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Fly.io CLI 설치
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: 배포
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          cd slack-agents
          flyctl deploy --build-arg BUILD_SHA=${GITHUB_SHA::7}
