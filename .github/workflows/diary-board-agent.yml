name: 생각일기 이사회 에이전트

on:
  schedule:
    # 매 시간 실행 (Supabase 설정에 따라 스킵)
    - cron: '0 * * * *'
  workflow_dispatch:
    # 수동 실행 (Actions 탭 → Run workflow)

jobs:
  board-report:
    name: 생각일기 이사회 보고서 생성 & 텔레그램 발송
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install anthropic

      - name: Notion DB 제목 확인 (진단용)
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          BOARD_NOTION_DATABASE_ID: ${{ secrets.BOARD_NOTION_DATABASE_ID }}
        run: |
          python3 << 'PYEOF'
          import os, urllib.request, json
          token = os.environ["NOTION_API_KEY"]
          headers = {"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28"}
          for label, db_id in [
            ("NOTION_DATABASE_ID (생각일기 읽기)", os.environ.get("NOTION_DATABASE_ID","")),
            ("BOARD_NOTION_DATABASE_ID (이사회 보고서 저장)", os.environ.get("BOARD_NOTION_DATABASE_ID","")),
            ("Supabase 저장 이사회 DB", "3181114e649180dc8431f9ef1a89df67"),
          ]:
            if not db_id: print(f"  (미설정) {label}"); continue
            url = f"https://api.notion.com/v1/databases/{db_id.replace('-','')}"
            req = urllib.request.Request(url, headers=headers)
            try:
              with urllib.request.urlopen(req) as r:
                data = json.loads(r.read())
                title = "".join(t["plain_text"] for t in data.get("title",[]))
                print(f"  OK  {label}: '{title}'")
            except urllib.error.HTTPError as e:
              body = e.read().decode()[:120]
              print(f"  ERR {label}: HTTP {e.code} → {body}")
          PYEOF

      - name: 이사회 에이전트 실행
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          BOARD_NOTION_DATABASE_ID: ${{ secrets.BOARD_NOTION_DATABASE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/diary_board_agent.py
