name: 이사회 안건/표결 에이전트

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'agenda 또는 vote'
        required: true
        default: 'agenda'
      topic:
        description: '안건/표결 내용'
        required: true
      msg_id:
        description: '텔레그램 메시지 ID (회신용)'
        required: false
        default: '0'

jobs:
  board-agenda:
    name: 이사회 안건/표결 처리
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install anthropic

      - name: 에이전트 실행
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_TOPIC: ${{ github.event.inputs.topic }}
          INPUT_MSG_ID: ${{ github.event.inputs.msg_id }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          BOARD_NOTION_DATABASE_ID: ${{ secrets.BOARD_NOTION_DATABASE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/board_agenda_agent.py
