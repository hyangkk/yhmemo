app = 'yhmemo-studio'
primary_region = 'nrt'  # 도쿄 (한국에서 가장 가까운 리전)

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "studio_data"
  destination = "/app/data"

[env]
  PYTHONUNBUFFERED = "1"

[vm]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
